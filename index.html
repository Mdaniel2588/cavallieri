<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinica Cavallieri</title>
    <link rel="stylesheet" href="styles.css">
    <script src="dados_historicos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script defer src="app.js"></script>
</head>
<body>
    <div class="header-container">
        <div class="brand">Clinica Cavallieri</div>
    </div>

    <div class="main-title-banner" id="tituloPrincipal">DASHBOARD DE PERFORMANCE</div>
    <div class="status-banner" id="statusBanner" hidden></div>

    <div class="filters">
        <div class="filter-row">
            <span>Periodo:</span>
            <select id="anoFiltro"></select>
            <select id="mesFiltro"></select>
        </div>

        <div class="filter-row" id="grupoBotoes">
            <span>Salas:</span>
            <button class="active" data-sala="ALL">VISAO GERAL</button>
            <button data-sala="306">306</button>
            <button data-sala="307">307</button>
            <button data-sala="313">313</button>
            <button data-sala="602">602</button>
            <button data-sala="606">606</button>
        </div>

        <div class="filter-row" id="grupoPeriodo">
            <span>Visualizacao:</span>
            <button class="active btn-periodo" data-periodo="1">MENSAL</button>
            <button class="btn-periodo" data-periodo="3">3 MESES</button>
            <button class="btn-periodo" data-periodo="6">6 MESES</button>
            <button class="btn-periodo" data-periodo="12">12 MESES</button>
        </div>

        <div class="filter-row">
            <span>Excluir salas:</span>
            <div id="filtrosExclusao"></div>
        </div>
    </div>

    <div class="cardbar">
        <div class="card"><div class="big" id="att">0</div>Atendimentos</div>
        <div class="card"><div class="big" id="occ">0%</div>Ocupacao</div>
        <div class="card"><div class="big" id="rec">R$ 0</div>Receita</div>
        <div class="card"><div class="big" id="ticket">R$ 0</div>Ticket medio</div>
    </div>

    <div class="container">
        <div class="left">
            <b id="tituloEsquerdo">Detalhes</b>
            <table id="calendar"></table>
            <div class="chart-wrapper">
                <canvas id="chartCapacidade" style="display:none;"></canvas>
            </div>
        </div>
        <div class="right">
            <div class="chart-header">
                <b id="tituloDireito">Analise de Dados</b>
                <div id="legendCustom" class="legend-custom"></div>
            </div>
            <div class="chart-wrapper">
                <canvas id="chartRight"></canvas>
            </div>
        </div>
    </div>
</body>
</html>
